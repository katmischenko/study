<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Учебный трекер Python</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }

        body {
            background: #1E1E2F;
            min-height: 100vh;
            padding: 16px;
        }

        @media (min-width: 768px) {
            body { padding: 24px; }
        }

        .container { max-width: 1400px; margin: 0 auto; }

        /* ШАПКА */
        .header {
            background: #2D2D44;
            color: #F4F4F9;
            padding: 24px 20px;
            border-radius: 24px;
            margin-bottom: 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .header::before { content: '🐍'; position: absolute; right: 15px; bottom: 5px; font-size: 70px; opacity: 0.08; }
        @media (min-width: 768px) { .header { padding: 32px 36px; } .header::before { font-size: 90px; } }
        .header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 10px; }
        @media (min-width: 768px) { .header h1 { font-size: 2rem; } }
        .student-name { font-size: 0.85rem; display: inline-flex; background: #3D3D5C; padding: 5px 16px; border-radius: 40px; }
        @media (min-width: 768px) { .student-name { font-size: 1rem; } }

        /* КАРТОЧКИ */
        .card {
            background: #2D2D44;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 20px;
            color: #F4F4F9;
            border: 1px solid #3D3D5C;
        }
        @media (min-width: 768px) { .card { padding: 24px; margin-bottom: 24px; border-radius: 24px; } }
        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 2px solid #3D3D5C;
        }
        @media (min-width: 768px) { .card h2 { font-size: 1.25rem; margin-bottom: 18px; } }

        /* СТАТИСТИКА */
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        @media (min-width: 550px) { .stats { grid-template-columns: repeat(3, 1fr); gap: 16px; } }
        @media (min-width: 900px) { .stats { gap: 20px; } }
        .stat-card {
            background: #2D2D44;
            padding: 14px 10px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #3D3D5C;
        }
        @media (min-width: 768px) { .stat-card { padding: 18px 16px; border-radius: 20px; } }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: #6C5CE7; }
        @media (min-width: 768px) { .stat-value { font-size: 2rem; } }
        .stat-value.small { font-size: 1.2rem; }
        @media (min-width: 768px) { .stat-value.small { font-size: 1.6rem; } }
        .stat-label { font-size: 0.6rem; color: #A5A5C0; margin-top: 4px; text-transform: uppercase; }
        .stat-sub { font-size: 0.55rem; color: #7A7A9A; margin-top: 4px; }

        /* ========== РАСПИСАНИЕ (КАРТОЧКИ) ========== */
        .schedule-section {
            margin-bottom: 24px;
        }
        .schedule-section-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #A5A5C0;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid #3D3D5C;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .schedule-section-title .count {
            background: #3D3D5C;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .schedule-section-title .toggle-icon {
            margin-left: auto;
            font-size: 0.7rem;
        }
        .schedule-cards {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .lesson-card {
            background: #1E1E2F;
            border-radius: 14px;
            padding: 12px 14px;
            transition: all 0.2s;
            border-left: 3px solid;
        }
        .lesson-card.past {
            border-left-color: #4A3B9A;
            opacity: 0.7;
        }
        .lesson-card.upcoming {
            border-left-color: #6C5CE7;
            background: #25253a;
        }
        .lesson-card:hover {
            transform: translateX(4px);
        }
        .lesson-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
            gap: 8px;
        }
        .lesson-number {
            font-weight: 700;
            font-size: 0.7rem;
            color: #6C5CE7;
            background: #3D3D5C;
            padding: 2px 8px;
            border-radius: 20px;
        }
        .lesson-date {
            font-size: 0.7rem;
            color: #A5A5C0;
        }
        .lesson-topic {
            font-weight: 600;
            font-size: 0.9rem;
            color: #F4F4F9;
            margin-bottom: 8px;
        }
        @media (min-width: 768px) {
            .lesson-topic { font-size: 1rem; }
        }
        .lesson-details {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.7rem;
            color: #A5A5C0;
        }
        .lesson-time {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .lesson-homework {
            cursor: pointer;
            color: #6C5CE7;
            text-decoration: underline dotted;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .lesson-homework:hover {
            color: #8B7AFF;
        }
        .duration-badge {
            background: #3D3D5C;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.65rem;
        }
        .empty-message {
            text-align: center;
            padding: 20px;
            color: #A5A5C0;
            font-size: 0.8rem;
        }

        /* МОДУЛИ - РАБОЧАЯ ВЕРСИЯ */
        .modules-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }
        @media (min-width: 768px) {
            .modules-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
        }
        .module-item {
            background: #2D2D44;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #3D3D5C;
        }
        .module-header {
            background: #3D3D5C;
            padding: 14px 18px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .module-header:hover {
            background: #4A3B9A;
        }
        .module-title {
            font-weight: 700;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #F4F4F9;
        }
        .module-percent {
            background: #2D2D44;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #6C5CE7;
        }
        .module-expand-icon {
            transition: transform 0.3s ease;
            font-size: 0.8rem;
            color: #A5A5C0;
        }
        .module-item.open .module-expand-icon {
            transform: rotate(180deg);
        }
        .module-content {
            display: none;
            padding: 16px;
            background: #2D2D44;
        }
        .module-item.open .module-content {
            display: block;
        }
        
        /* Темы внутри модуля */
        .topic-item {
            background: #1E1E2F;
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .topic-header {
            background: #25253a;
            padding: 12px 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .topic-header:hover {
            background: #2D2D44;
        }
        .topic-name {
            font-weight: 600;
            font-size: 0.85rem;
            color: #F4F4F9;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .topic-percent {
            font-size: 0.7rem;
            font-weight: 600;
            color: #6C5CE7;
            background: #2D2D44;
            padding: 3px 10px;
            border-radius: 20px;
        }
        .topic-expand-icon {
            transition: transform 0.2s ease;
            font-size: 0.7rem;
            color: #A5A5C0;
            margin-left: 8px;
        }
        .topic-item.open .topic-expand-icon {
            transform: rotate(180deg);
        }
        .subtopics-list {
            display: none;
            padding: 12px 14px;
            background: #1E1E2F;
        }
        .topic-item.open .subtopics-list {
            display: block;
        }
        .subtopic-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #3D3D5C;
        }
        .subtopic-item:last-child {
            border-bottom: none;
        }
        .subtopic-name {
            font-size: 0.75rem;
            color: #A5A5C0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 2;
        }
        .progress-bar-small {
            width: 80px;
            height: 5px;
            background: #3D3D5C;
            border-radius: 3px;
            overflow: hidden;
        }
        @media (min-width: 768px) {
            .progress-bar-small {
                width: 100px;
            }
        }
        .progress-fill-small {
            height: 100%;
            border-radius: 3px;
        }
        .subtopic-percent {
            font-weight: 600;
            font-size: 0.7rem;
            min-width: 45px;
            text-align: right;
            color: #6C5CE7;
        }

        /* КНОПКА РЕДАКТИРОВАНИЯ */
        .edit-button {
            position: fixed;
            bottom: 16px;
            right: 16px;
            background: #6C5CE7;
            color: #F4F4F9;
            border: none;
            border-radius: 50px;
            padding: 10px 18px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
        }
        @media (min-width: 768px) { .edit-button { bottom: 24px; right: 24px; padding: 12px 24px; font-size: 0.9rem; } }

        /* МОДАЛЬНОЕ ОКНО */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1E1E2F;
            border-radius: 24px;
            width: 95%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 20px;
            border: 1px solid #6C5CE7;
        }
        @media (min-width: 768px) { .modal-content { max-width: 700px; padding: 24px; border-radius: 28px; } }
        .modal-content h3 { color: #F4F4F9; margin-bottom: 16px; font-size: 1.2rem; }

        .editor-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .editor-tab {
            background: #2D2D44;
            border: none;
            padding: 8px 14px;
            border-radius: 30px;
            color: #A5A5C0;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            flex: 1;
            text-align: center;
            min-width: 70px;
        }
        @media (min-width: 768px) { .editor-tab { padding: 10px 18px; font-size: 0.85rem; } }
        .editor-tab.active { background: #6C5CE7; color: #F4F4F9; }
        .editor-panel { display: none; }
        .editor-panel.active { display: block; }
        
        .editor-section {
            background: #2D2D44;
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 16px;
        }
        .editor-section label { color: #F4F4F9; font-size: 0.7rem; margin-bottom: 4px; display: block; }
        .editor-section input, .editor-section textarea, .editor-section select {
            width: 100%;
            padding: 8px 10px;
            margin-bottom: 10px;
            background: #1E1E2F;
            border: 1px solid #3D3D5C;
            border-radius: 10px;
            color: #F4F4F9;
            font-size: 0.8rem;
        }
        .btn-group-inline { display: flex; gap: 8px; margin-top: 8px; }
        .btn-save-block { background: #6C5CE7; color: #F4F4F9; border: none; border-radius: 30px; padding: 6px 12px; font-size: 0.7rem; cursor: pointer; flex: 1; }
        .schedule-editor-item {
            background: #1E1E2F;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 10px;
        }
        .schedule-editor-item.past { opacity: 0.6; background: #2a2a3a; }
        .schedule-editor-header {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            font-size: 0.6rem;
            color: #6C5CE7;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .schedule-editor-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }
        .schedule-editor-row input, .schedule-editor-row textarea { margin-bottom: 0; font-size: 0.75rem; padding: 6px 8px; }
        .toggle-past-btn {
            background: #3D3D5C;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: #F4F4F9;
            font-size: 0.7rem;
            cursor: pointer;
            margin-bottom: 12px;
            width: 100%;
        }
        .remove-btn {
            background: #4A3B9A;
            color: #F4F4F9;
            border: none;
            border-radius: 20px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 0.65rem;
        }
        .add-btn {
            background: #6C5CE7;
            color: #F4F4F9;
            border: none;
            border-radius: 30px;
            padding: 8px 12px;
            margin-top: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            width: 100%;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-save { background: #6C5CE7; color: #F4F4F9; border: none; }
        .btn-cancel { background: #2D2D44; color: #F4F4F9; border: 1px solid #3D3D5C; }
        .error-message { color: #FF6B6B; font-size: 0.7rem; margin-top: 8px; text-align: center; }
        .info-note {
            background: #2D2D44;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.65rem;
            color: #A5A5C0;
            border-left: 3px solid #6C5CE7;
            margin-bottom: 16px;
        }
        .block-saved-message { color: #6C5CE7; font-size: 0.65rem; text-align: center; margin-top: 6px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🐍 Python-разработчик</h1>
        <div class="student-name" id="studentName">👨‍🎓 Загрузка...</div>
    </div>

    <div class="card">
        <h2>📅 Расписание занятий</h2>
        <div id="scheduleContainer">Загрузка...</div>
    </div>

    <div class="stats" id="statsContainer"></div>

    <div class="card">
        <h2>📚 Модули курса</h2>
        <div class="modules-grid" id="modulesContainer">Загрузка...</div>
    </div>
</div>

<button class="edit-button" id="editButton">✏️ Редактировать</button>

<div class="modal" id="editModal">
    <div class="modal-content">
        <h3 id="modalTitle">Введите пароль</h3>
        <div id="passwordSection">
            <input type="password" id="passwordInput" placeholder="Пароль">
            <div class="modal-buttons">
                <button class="btn-save" id="submitPassword">Войти</button>
                <button class="btn-cancel" id="closeModal">Отмена</button>
            </div>
            <div id="passwordError" class="error-message"></div>
        </div>
        <div id="editorSection" style="display: none;">
            <div class="info-note">⚡ Редактируйте данные в каждом блоке. Нажмите "Сохранить блок" после изменений, затем "Сохранить всё в GitHub".</div>
            <div class="editor-tabs" id="editorTabs">
                <button class="editor-tab active" data-panel="basic">⚙️ Основное</button>
                <button class="editor-tab" data-panel="schedule">📅 Расписание</button>
                <button class="editor-tab" data-panel="modules">📚 Модули</button>
            </div>
            
            <div id="panel-basic" class="editor-panel active">
                <div class="editor-section">
                    <label>👤 Имя ученика</label>
                    <input type="text" id="editStudentName">
                    <label>📊 Всего занятий в курсе</label>
                    <input type="number" id="editTotalLessons">
                    <div class="btn-group-inline"><button class="btn-save-block" onclick="saveBasicBlock()">💾 Сохранить блок</button></div>
                    <div id="basicSavedMsg" class="block-saved-message"></div>
                </div>
            </div>
            
            <div id="panel-schedule" class="editor-panel">
                <div class="editor-section">
                    <button class="toggle-past-btn" id="togglePastBtn">📅 Показать прошедшие занятия</button>
                    <div id="scheduleEditorList"></div>
                    <button class="add-btn" onclick="addScheduleItem()">+ Добавить занятие</button>
                    <div class="btn-group-inline" style="margin-top:12px;"><button class="btn-save-block" onclick="saveScheduleBlock()">💾 Сохранить блок (Расписание)</button></div>
                    <div id="scheduleSavedMsg" class="block-saved-message"></div>
                </div>
            </div>
            
            <div id="panel-modules" class="editor-panel">
                <div class="editor-section">
                    <div class="module-select">
                        <label>📦 Выберите модуль для редактирования</label>
                        <select id="moduleSelect" onchange="loadSelectedModule()"></select>
                    </div>
                    <div id="currentModuleEditor"></div>
                    <button class="add-btn" onclick="addNewModule()">+ Добавить новый модуль</button>
                    <div class="btn-group-inline" style="margin-top:12px;"><button class="btn-save-block" onclick="saveModuleBlock()">💾 Сохранить блок (Текущий модуль)</button></div>
                    <div id="moduleSavedMsg" class="block-saved-message"></div>
                </div>
            </div>
            
            <div class="modal-buttons">
                <button class="btn-save" id="saveDataBtn">💾 Сохранить всё в GitHub</button>
                <button class="btn-cancel" id="cancelEdit">Отмена</button>
            </div>
            <div id="saveResult" class="error-message"></div>
        </div>
    </div>
</div>

<script>
    const EDITOR_PASSWORD = "Alik69";
    let currentData = null;
    let repoUsername = "katmischenko";
    let repoName = "study";
    let showPastLessons = false;

    async function loadData() {
        try {
            const response = await fetch('data.json?v=' + Date.now());
            if (!response.ok) throw new Error('Файл data.json не найден');
            currentData = await response.json();
            document.getElementById('studentName').innerHTML = `👨‍🎓 Ученик: ${escapeHtml(currentData.studentName)}`;
            renderScheduleCards(currentData.scheduleData);
            renderStats(currentData.modulesData, currentData.scheduleData.length, currentData.totalLessons);
            renderModules(currentData.modulesData);
        } catch (error) {
            document.getElementById('scheduleContainer').innerHTML = '<p style="color: #A5A5C0; padding: 20px;">❌ Ошибка загрузки данных</p>';
        }
    }

    function formatDateShort(dateStr) {
        try { return new Date(dateStr).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', weekday: 'short' }); }
        catch(e) { return dateStr; }
    }

    function isPastLesson(lesson) {
        if (!lesson.date) return false;
        const lessonDate = new Date(lesson.date);
        lessonDate.setHours(0, 0, 0, 0);
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        if (lessonDate < today) return true;
        
        if (lessonDate.getTime() === today.getTime() && lesson.endTime) {
            const now = new Date();
            const [endHour, endMin] = lesson.endTime.split(':').map(Number);
            const lessonEndTime = new Date();
            lessonEndTime.setHours(endHour, endMin, 0, 0);
            return now > lessonEndTime;
        }
        return false;
    }

    function renderScheduleCards(schedule) {
        if (!schedule || schedule.length === 0) {
            document.getElementById('scheduleContainer').innerHTML = '<div class="empty-message">📭 Нет занятий</div>';
            return;
        }

        const upcoming = [];
        const past = [];
        
        schedule.forEach((lesson, idx) => {
            if (isPastLesson(lesson)) {
                past.push({ ...lesson, number: idx + 1 });
            } else {
                upcoming.push({ ...lesson, number: idx + 1 });
            }
        });

        let html = '';

        if (upcoming.length > 0) {
            html += `<div class="schedule-section">
                <div class="schedule-section-title">
                    📅 ПРЕДСТОЯЩИЕ ЗАНЯТИЯ <span class="count">${upcoming.length}</span>
                </div>
                <div class="schedule-cards">`;
            
            upcoming.forEach((lesson) => {
                const duration = calculateDuration(lesson.startTime, lesson.endTime);
                html += `
                    <div class="lesson-card upcoming">
                        <div class="lesson-header">
                            <span class="lesson-number">Занятие ${lesson.number}</span>
                            <span class="lesson-date">${formatDateShort(lesson.date)}</span>
                        </div>
                        <div class="lesson-topic">${escapeHtml(lesson.topic)}</div>
                        <div class="lesson-details">
                            <span class="lesson-time">⏰ ${lesson.startTime || '—'}–${lesson.endTime || '—'} <span class="duration-badge">${duration}</span></span>
                            <span class="lesson-homework" onclick="alert('📖 ${escapeHtml(lesson.topic)}\n\n${escapeHtml(lesson.homework || 'Домашнее задание не задано')}')">📄 ${lesson.homework ? (lesson.homework.length > 50 ? lesson.homework.substring(0, 50) + '…' : lesson.homework) : 'Нет ДЗ'}</span>
                        </div>
                    </div>
                `;
            });
            html += `</div></div>`;
        }

        if (past.length > 0) {
            const pastDisplay = showPastLessons ? 'block' : 'none';
            html += `<div class="schedule-section">
                <div class="schedule-section-title" onclick="togglePastDisplay()">
                    📆 ПРОШЕДШИЕ ЗАНЯТИЯ <span class="count">${past.length}</span>
                    <span class="toggle-icon">${showPastLessons ? '▼' : '▶'}</span>
                </div>
                <div id="pastLessonsContainer" style="display: ${pastDisplay};">
                    <div class="schedule-cards">`;
            
            past.forEach(lesson => {
                const duration = calculateDuration(lesson.startTime, lesson.endTime);
                html += `
                    <div class="lesson-card past">
                        <div class="lesson-header">
                            <span class="lesson-number">Занятие ${lesson.number}</span>
                            <span class="lesson-date">${formatDateShort(lesson.date)}</span>
                        </div>
                        <div class="lesson-topic">${escapeHtml(lesson.topic)}</div>
                        <div class="lesson-details">
                            <span class="lesson-time">⏰ ${lesson.startTime || '—'}–${lesson.endTime || '—'} <span class="duration-badge">${duration}</span></span>
                            <span class="lesson-homework" onclick="alert('📖 ${escapeHtml(lesson.topic)}\n\n${escapeHtml(lesson.homework || 'Домашнее задание не задано')}')">📄 ${lesson.homework ? (lesson.homework.length > 50 ? lesson.homework.substring(0, 50) + '…' : lesson.homework) : 'Нет ДЗ'}</span>
                        </div>
                    </div>
                `;
            });
            html += `</div></div></div>`;
        }

        if (upcoming.length === 0 && past.length === 0) {
            html = '<div class="empty-message">📭 Нет занятий</div>';
        }

        document.getElementById('scheduleContainer').innerHTML = html;
    }

    function togglePastDisplay() {
        showPastLessons = !showPastLessons;
        renderScheduleCards(currentData.scheduleData);
    }

    function renderStats(modules, lessonsCount, totalLessons) {
        if (!modules || modules.length === 0) return;
        const total = modules.length;
        const avg = Math.round(modules.reduce((a, b) => a + (b.percent || 0), 0) / total);
        const maxModule = modules.reduce((max, m) => (m.percent || 0) > (max.percent || 0) ? m : max, modules[0]);
        const weakModule = modules.reduce((min, m) => (m.percent || 0) < (min.percent || 0) ? m : min, modules[0]);
        const highModules = modules.filter(m => (m.percent || 0) >= 70).length;
        document.getElementById('statsContainer').innerHTML = `
            <div class="stat-card"><div class="stat-value small">${lessonsCount}/${totalLessons}</div><div class="stat-label">Пройдено</div></div>
            <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Модулей</div></div>
            <div class="stat-card"><div class="stat-value">${maxModule.percent||0}%</div><div class="stat-label">🏆 Сильный</div><div class="stat-sub">${escapeHtml(maxModule.name.substring(0,20))}</div></div>
            <div class="stat-card"><div class="stat-value">${avg}%</div><div class="stat-label">📈 Средний</div></div>
            <div class="stat-card"><div class="stat-value">${Math.round((highModules/total)*100)}%</div><div class="stat-label">🎯 >70%</div><div class="stat-sub">${highModules} из ${total}</div></div>
            <div class="stat-card"><div class="stat-value">${weakModule.percent||0}%</div><div class="stat-label">⚠️ Повторить</div><div class="stat-sub">${escapeHtml(weakModule.name.substring(0,20))}</div></div>
        `;
    }

    // ========== РАБОЧИЕ МОДУЛИ ==========
    function renderModules(modules) {
        if (!modules || modules.length === 0) {
            document.getElementById('modulesContainer').innerHTML = '<p style="color: #A5A5C0;">Нет модулей</p>';
            return;
        }
        
        let html = '';
        modules.forEach((module, mIdx) => {
            const modulePercent = module.percent || 0;
            const moduleColor = modulePercent >= 75 ? '#27ae60' : (modulePercent >= 50 ? '#f39c12' : '#e74c3c');
            
            html += `
                <div class="module-item" data-module="${mIdx}">
                    <div class="module-header" onclick="toggleModule(this)">
                        <div class="module-title">
                            <span>📦</span> ${escapeHtml(module.name)}
                        </div>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <span class="module-percent" style="background: ${moduleColor}20; color: ${moduleColor};">${modulePercent}%</span>
                            <span class="module-expand-icon">▼</span>
                        </div>
                    </div>
                    <div class="module-content">
                        ${renderModuleTopics(module.topics)}
                    </div>
                </div>
            `;
        });
        
        document.getElementById('modulesContainer').innerHTML = html;
    }

    function renderModuleTopics(topics) {
        if (!topics || topics.length === 0) return '<p style="color: #A5A5C0; padding: 10px;">Нет тем</p>';
        
        let html = '';
        topics.forEach((topic, tIdx) => {
            const topicPercent = topic.percent || 0;
            const topicColor = topicPercent >= 75 ? '#27ae60' : (topicPercent >= 50 ? '#f39c12' : '#e74c3c');
            
            html += `
                <div class="topic-item">
                    <div class="topic-header" onclick="event.stopPropagation(); toggleTopic(this)">
                        <div class="topic-name">
                            <span>📘</span> ${escapeHtml(topic.name)}
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span class="topic-percent" style="color: ${topicColor};">${topicPercent}%</span>
                            <span class="topic-expand-icon">▼</span>
                        </div>
                    </div>
                    <div class="subtopics-list">
                        ${renderSubtopicList(topic.subtopics)}
                    </div>
                </div>
            `;
        });
        return html;
    }

    function renderSubtopicList(subtopics) {
        if (!subtopics || subtopics.length === 0) return '<p style="color: #A5A5C0; padding: 8px;">Нет подтем</p>';
        
        let html = '';
        subtopics.forEach(sub => {
            const subColor = sub.percent >= 75 ? '#27ae60' : (sub.percent >= 50 ? '#f39c12' : '#e74c3c');
            html += `
                <div class="subtopic-item">
                    <div class="subtopic-name">
                        <span>📌</span> ${escapeHtml(sub.name)}
                        <div class="progress-bar-small">
                            <div class="progress-fill-small" style="width: ${sub.percent}%; background: ${subColor};"></div>
                        </div>
                    </div>
                    <span class="subtopic-percent" style="color: ${subColor};">${sub.percent}%</span>
                </div>
            `;
        });
        return html;
    }

    function toggleModule(element) {
        const moduleItem = element.closest('.module-item');
        if (moduleItem) {
            moduleItem.classList.toggle('open');
        }
    }

    function toggleTopic(element) {
        const topicItem = element.closest('.topic-item');
        if (topicItem) {
            topicItem.classList.toggle('open');
        }
    }

    function calculateDuration(start, end) {
        if (!start || !end) return "—";
        const s = start.split(':'), e = end.split(':');
        const min = (parseInt(e[0])*60 + parseInt(e[1])) - (parseInt(s[0])*60 + parseInt(s[1]));
        if (min <= 0) return "—";
        const h = Math.floor(min/60), m = min % 60;
        return h > 0 ? `${h}ч ${m}мин` : `${m}мин`;
    }

    function escapeHtml(str) { 
        if (!str) return ''; 
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); 
    }

    // ========== ФУНКЦИИ СОХРАНЕНИЯ ==========
    function saveBasicBlock() {
        currentData.studentName = document.getElementById('editStudentName').value;
        currentData.totalLessons = parseInt(document.getElementById('editTotalLessons').value);
        document.getElementById('basicSavedMsg').innerHTML = '✅ Сохранено!';
        setTimeout(() => document.getElementById('basicSavedMsg').innerHTML = '', 2000);
        renderStats(currentData.modulesData, currentData.scheduleData.length, currentData.totalLessons);
    }

    function saveScheduleBlock() {
        for (let i = 0; i < currentData.scheduleData.length; i++) {
            const dateInput = document.getElementById(`schedule_date_${i}`);
            const topicInput = document.getElementById(`schedule_topic_${i}`);
            const startInput = document.getElementById(`schedule_start_${i}`);
            const endInput = document.getElementById(`schedule_end_${i}`);
            const hwInput = document.getElementById(`schedule_hw_${i}`);
            if (dateInput) currentData.scheduleData[i].date = dateInput.value;
            if (topicInput) currentData.scheduleData[i].topic = topicInput.value;
            if (startInput) currentData.scheduleData[i].startTime = startInput.value;
            if (endInput) currentData.scheduleData[i].endTime = endInput.value;
            if (hwInput) currentData.scheduleData[i].homework = hwInput.value;
        }
        renderScheduleCards(currentData.scheduleData);
        renderStats(currentData.modulesData, currentData.scheduleData.length, currentData.totalLessons);
        document.getElementById('scheduleSavedMsg').innerHTML = '✅ Расписание сохранено!';
        setTimeout(() => document.getElementById('scheduleSavedMsg').innerHTML = '', 2000);
    }

    function saveModuleBlock() {
        const mIdx = parseInt(document.getElementById('moduleSelect').value);
        if (isNaN(mIdx) || !currentData.modulesData[mIdx]) return;
        currentData.modulesData[mIdx].name = document.getElementById('editModuleName').value;
        for (let tIdx = 0; tIdx < currentData.modulesData[mIdx].topics.length; tIdx++) {
            const topicName = document.getElementById(`topic_name_${mIdx}_${tIdx}`);
            if (topicName) currentData.modulesData[mIdx].topics[tIdx].name = topicName.value;
            let totalSubPercent = 0;
            for (let sIdx = 0; sIdx < currentData.modulesData[mIdx].topics[tIdx].subtopics.length; sIdx++) {
                const subName = document.getElementById(`sub_name_${mIdx}_${tIdx}_${sIdx}`);
                const subPercent = document.getElementById(`sub_percent_${mIdx}_${tIdx}_${sIdx}`);
                if (subName) currentData.modulesData[mIdx].topics[tIdx].subtopics[sIdx].name = subName.value;
                if (subPercent) {
                    const val = parseInt(subPercent.value) || 0;
                    currentData.modulesData[mIdx].topics[tIdx].subtopics[sIdx].percent = val;
                    totalSubPercent += val;
                }
            }
            const newTopicPercent = Math.round(totalSubPercent / currentData.modulesData[mIdx].topics[tIdx].subtopics.length);
            currentData.modulesData[mIdx].topics[tIdx].percent = newTopicPercent;
        }
        let totalTopicPercent = 0;
        for (let tIdx = 0; tIdx < currentData.modulesData[mIdx].topics.length; tIdx++) {
            totalTopicPercent += currentData.modulesData[mIdx].topics[tIdx].percent;
        }
        currentData.modulesData[mIdx].percent = Math.round(totalTopicPercent / currentData.modulesData[mIdx].topics.length);
        renderModules(currentData.modulesData);
        renderStats(currentData.modulesData, currentData.scheduleData.length, currentData.totalLessons);
        document.getElementById('moduleSavedMsg').innerHTML = '✅ Модуль сохранён!';
        setTimeout(() => document.getElementById('moduleSavedMsg').innerHTML = '', 2000);
    }

    function showEditor() {
        document.getElementById('modalTitle').innerText = 'Редактор';
        document.getElementById('passwordSection').style.display = 'none';
        document.getElementById('editorSection').style.display = 'block';
        document.getElementById('editStudentName').value = currentData.studentName;
        document.getElementById('editTotalLessons').value = currentData.totalLessons;
        renderScheduleEditor();
        renderModuleSelect();
        loadSelectedModule();
        initTabs();
    }

    function initTabs() {
        const tabs = document.querySelectorAll('.editor-tab');
        tabs.forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.editor-panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`panel-${tab.dataset.panel}`).classList.add('active');
            };
        });
    }

    function renderScheduleEditor() {
        let html = '';
        let visibleCount = 0;
        currentData.scheduleData.forEach((item, idx) => {
            const isPast = isPastLesson(item);
            if (!showPastLessons && isPast) return;
            visibleCount++;
            html += `
                <div class="schedule-editor-item ${isPast ? 'past' : ''}">
                    <div class="schedule-editor-header"><span>📅 Дата</span><span>📖 Тема</span></div>
                    <div class="schedule-editor-row">
                        <input type="date" value="${item.date}" id="schedule_date_${idx}">
                        <input type="text" value="${escapeHtml(item.topic)}" id="schedule_topic_${idx}" placeholder="Тема">
                    </div>
                    <div class="schedule-editor-header"><span>⏰ Время</span><span>📝 ДЗ</span></div>
                    <div class="schedule-editor-row">
                        <div style="display:flex; gap:4px;"><input type="time" value="${item.startTime}" id="schedule_start_${idx}" style="width:50%;"><input type="time" value="${item.endTime}" id="schedule_end_${idx}" style="width:50%;"></div>
                        <textarea id="schedule_hw_${idx}" rows="2" placeholder="Домашнее задание">${escapeHtml(item.homework)}</textarea>
                    </div>
                    <button class="remove-btn" style="margin-top:6px;" onclick="removeScheduleItem(${idx})">🗑 Удалить занятие</button>
                </div>
            `;
        });
        if (visibleCount === 0 && !showPastLessons) {
            html = '<div class="info-note" style="text-align:center;">📭 Нет предстоящих занятий. Нажмите "Показать прошедшие" для редактирования.</div>';
        }
        document.getElementById('scheduleEditorList').innerHTML = html;
    }

    function renderModuleSelect() {
        const select = document.getElementById('moduleSelect');
        let options = '';
        currentData.modulesData.forEach((module, idx) => {
            options += `<option value="${idx}">${idx+1}. ${escapeHtml(module.name)}</option>`;
        });
        select.innerHTML = options;
    }

    function loadSelectedModule() {
        const mIdx = parseInt(document.getElementById('moduleSelect').value);
        if (isNaN(mIdx)) return;
        const module = currentData.modulesData[mIdx];
        let html = `<div class="current-module-editor">
            <label>📦 Название модуля</label>
            <input type="text" id="editModuleName" value="${escapeHtml(module.name)}" style="margin-bottom:12px;">
            <div id="moduleTopicsEditor"></div>
            <button class="add-btn" style="margin-top:8px;" onclick="addTopicToCurrentModule()">+ Добавить тему</button>
            <button class="remove-btn" style="margin-top:8px;" onclick="deleteCurrentModule()">🗑 Удалить модуль</button>
        </div>`;
        document.getElementById('currentModuleEditor').innerHTML = html;
        renderTopicsEditor(mIdx);
    }

    function renderTopicsEditor(mIdx) {
        const module = currentData.modulesData[mIdx];
        let html = '';
        module.topics.forEach((topic, tIdx) => {
            html += `<div class="topic-editor-item" style="background:#2D2D44; border-radius:12px; padding:10px; margin-bottom:10px;">
                <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                    <input type="text" value="${escapeHtml(topic.name)}" id="topic_name_${mIdx}_${tIdx}" placeholder="Название темы" style="flex:2;">
                    <button class="remove-btn" onclick="removeTopicFromCurrent(${tIdx})">✖</button>
                </div>
                <div id="subtopics_${mIdx}_${tIdx}">`;
            topic.subtopics.forEach((sub, sIdx) => {
                html += `<div class="subtopic-editor" style="display: flex; gap: 6px; margin-bottom: 6px;">
                    <input type="text" value="${escapeHtml(sub.name)}" id="sub_name_${mIdx}_${tIdx}_${sIdx}" placeholder="Подтема" style="flex:3;">
                    <input type="number" value="${sub.percent}" id="sub_percent_${mIdx}_${tIdx}_${sIdx}" placeholder="%" min="0" max="100" style="width:70px;">
                    <button class="remove-btn" onclick="removeSubtopicFromCurrent(${tIdx}, ${sIdx})">✖</button>
                </div>`;
            });
            html += `<button class="add-btn" style="margin-top:5px; padding:4px 12px;" onclick="addSubtopicToCurrent(${tIdx})">+ Добавить подтему</button>
                </div>
            </div>`;
        });
        document.getElementById('moduleTopicsEditor').innerHTML = html;
    }

    function addScheduleItem() {
        currentData.scheduleData.push({
            id: currentData.scheduleData.length + 1,
            date: new Date().toISOString().split('T')[0],
            topic: "Новое занятие",
            startTime: "17:00",
            endTime: "19:00",
            homework: ""
        });
        renderScheduleEditor();
    }

    function removeScheduleItem(idx) {
        currentData.scheduleData.splice(idx, 1);
        currentData.scheduleData.forEach((item, i) => { item.id = i + 1; });
        renderScheduleEditor();
    }

    function addNewModule() {
        currentData.modulesData.push({
            name: "Новый модуль",
            percent: 0,
            topics: [{ name: "Новая тема", percent: 0, subtopics: [{ name: "Новая подтема", percent: 0 }] }]
        });
        renderModuleSelect();
        document.getElementById('moduleSelect').value = currentData.modulesData.length - 1;
        loadSelectedModule();
    }

    function deleteCurrentModule() {
        const mIdx = parseInt(document.getElementById('moduleSelect').value);
        if (currentData.modulesData.length > 1) {
            currentData.modulesData.splice(mIdx, 1);
            renderModuleSelect();
            document.getElementById('moduleSelect').value = 0;
            loadSelectedModule();
        } else {
            alert("Нельзя удалить последний модуль");
        }
    }

    function addTopicToCurrentModule() {
        const mIdx = parseInt(document.getElementById('moduleSelect').value);
        currentData.modulesData[mIdx].topics.push({
            name: "Новая тема",
            percent: 0,
            subtopics: [{ name: "Новая подтема", percent: 0 }]
        });
        loadSelectedModule();
    }

    function removeTopicFromCurrent(tIdx) {
        const mIdx = parseInt(document.getElementById('moduleSelect').value);
        if (currentData.modulesData[mIdx].topics.length > 1) {
            currentData.modulesData[mIdx].topics.splice(tIdx, 1);
            loadSelectedModule();
        } else {
            alert("В модуле должна быть хотя бы одна тема");
        }
    }

    function addSubtopicToCurrent(tIdx) {
        const mIdx = parseInt(document.getElementById('moduleSelect').value);
        currentData.modulesData[mIdx].topics[tIdx].subtopics.push({ name: "Новая подтема", percent: 0 });
        loadSelectedModule();
    }

    function removeSubtopicFromCurrent(tIdx, sIdx) {
        const mIdx = parseInt(document.getElementById('moduleSelect').value);
        if (currentData.modulesData[mIdx].topics[tIdx].subtopics.length > 1) {
            currentData.modulesData[mIdx].topics[tIdx].subtopics.splice(sIdx, 1);
            loadSelectedModule();
        } else {
            alert("В теме должна быть хотя бы одна подтема");
        }
    }

    function collectAllData() {
        saveBasicBlock();
        saveScheduleBlock();
        saveModuleBlock();
    }

    async function saveDataToGitHub() {
        collectAllData();
        document.getElementById('saveResult').innerHTML = '⏳ Сохранение...';
        try {
            const token = prompt("Для сохранения в GitHub введите Personal Access Token (токен).\n\nКак получить: GitHub → Settings → Developer settings → Personal access tokens → Tokens (classic) → Generate new token (выберите repo)", "");
            if (!token) {
                document.getElementById('saveResult').innerHTML = '❌ Сохранение отменено. Токен не введён.';
                return;
            }
            const getResponse = await fetch(`https://api.github.com/repos/${repoUsername}/${repoName}/contents/data.json`, {
                headers: { 'Authorization': `token ${token}` }
            });
            if (!getResponse.ok) throw new Error('Не удалось получить файл. Проверьте токен.');
            const fileInfo = await getResponse.json();
            const updateResponse = await fetch(`https://api.github.com/repos/${repoUsername}/${repoName}/contents/data.json`, {
                method: 'PUT',
                headers: { 
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: 'Обновление данных',
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2)))),
                    sha: fileInfo.sha,
                    branch: 'main'
                })
            });
            if (updateResponse.ok) {
                document.getElementById('saveResult').innerHTML = '✅ Сохранено! Страница обновится...';
                setTimeout(() => location.reload(), 2500);
            } else {
                const errorData = await updateResponse.json();
                document.getElementById('saveResult').innerHTML = '❌ Ошибка: ' + (errorData.message || 'Неизвестная ошибка');
            }
        } catch(e) {
            document.getElementById('saveResult').innerHTML = '❌ Ошибка: ' + e.message;
        }
    }

    // Инициализация
    document.getElementById('editButton').onclick = () => {
        document.getElementById('editModal').classList.add('active');
        document.getElementById('passwordSection').style.display = 'block';
        document.getElementById('editorSection').style.display = 'none';
        document.getElementById('passwordInput').value = '';
    };
    document.getElementById('submitPassword').onclick = () => {
        if (document.getElementById('passwordInput').value === EDITOR_PASSWORD) showEditor();
        else document.getElementById('passwordError').innerHTML = '❌ Неверный пароль';
    };
    document.getElementById('closeModal').onclick = () => document.getElementById('editModal').classList.remove('active');
    document.getElementById('cancelEdit').onclick = () => document.getElementById('editModal').classList.remove('active');
    document.getElementById('saveDataBtn').onclick = saveDataToGitHub;

    window.addScheduleItem = addScheduleItem;
    window.removeScheduleItem = removeScheduleItem;
    window.addNewModule = addNewModule;
    window.addTopicToCurrentModule = addTopicToCurrentModule;
    window.removeTopicFromCurrent = removeTopicFromCurrent;
    window.addSubtopicToCurrent = addSubtopicToCurrent;
    window.removeSubtopicFromCurrent = removeSubtopicFromCurrent;
    window.deleteCurrentModule = deleteCurrentModule;
    window.loadSelectedModule = loadSelectedModule;
    window.togglePastDisplay = togglePastDisplay;
    window.saveBasicBlock = saveBasicBlock;
    window.saveScheduleBlock = saveScheduleBlock;
    window.saveModuleBlock = saveModuleBlock;
    window.toggleModule = toggleModule;
    window.toggleTopic = toggleTopic;

    loadData();
</script>
</body>
