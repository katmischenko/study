<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Учебный трекер Python</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }

        body {
            background: #1E1E2F;
            min-height: 100vh;
            padding: 16px;
        }

        @media (min-width: 768px) {
            body { padding: 24px; }
        }

        .container { max-width: 1400px; margin: 0 auto; }

        /* ШАПКА */
        .header {
            background: #2D2D44;
            color: #F4F4F9;
            padding: 24px 20px;
            border-radius: 24px;
            margin-bottom: 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .header::before { content: '🐍'; position: absolute; right: 15px; bottom: 5px; font-size: 70px; opacity: 0.08; }
        @media (min-width: 768px) { .header { padding: 32px 36px; } .header::before { font-size: 90px; } }
        .header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 10px; }
        @media (min-width: 768px) { .header h1 { font-size: 2rem; } }
        .student-name { font-size: 0.85rem; display: inline-flex; background: #3D3D5C; padding: 5px 16px; border-radius: 40px; }
        @media (min-width: 768px) { .student-name { font-size: 1rem; } }

        /* КАРТОЧКИ */
        .card {
            background: #2D2D44;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 20px;
            color: #F4F4F9;
            border: 1px solid #3D3D5C;
        }
        @media (min-width: 768px) { .card { padding: 24px; margin-bottom: 24px; border-radius: 24px; } }
        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 2px solid #3D3D5C;
        }
        @media (min-width: 768px) { .card h2 { font-size: 1.25rem; margin-bottom: 18px; } }

        /* СЛЕДУЮЩЕЕ ЗАНЯТИЕ */
        .next-lesson {
            background: linear-gradient(135deg, #3D3D5C 0%, #2D2D44 100%);
            border-radius: 16px;
            padding: 14px 18px;
            margin-bottom: 20px;
            border-left: 3px solid #6C5CE7;
        }
        @media (min-width: 768px) { .next-lesson { padding: 18px 24px; border-left: 4px solid #6C5CE7; } }
        .next-lesson-label { font-size: 0.65rem; text-transform: uppercase; color: #A5A5C0; margin-bottom: 6px; }
        .next-lesson-content { display: flex; flex-direction: column; gap: 6px; }
        @media (min-width: 640px) { .next-lesson-content { flex-direction: row; flex-wrap: wrap; gap: 16px; align-items: baseline; } }
        .next-lesson-date { font-size: 0.8rem; color: #C0C0E0; }
        .next-lesson-topic { font-size: 1rem; font-weight: 600; color: #F4F4F9; }
        .next-lesson-time { font-size: 0.8rem; color: #A5A5C0; }
        @media (min-width: 768px) { .next-lesson-topic { font-size: 1.1rem; } }

        /* СТАТИСТИКА */
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        @media (min-width: 550px) { .stats { grid-template-columns: repeat(3, 1fr); gap: 16px; } }
        @media (min-width: 900px) { .stats { gap: 20px; } }
        .stat-card {
            background: #2D2D44;
            padding: 14px 10px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #3D3D5C;
        }
        @media (min-width: 768px) { .stat-card { padding: 18px 16px; border-radius: 20px; } }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: #6C5CE7; }
        @media (min-width: 768px) { .stat-value { font-size: 2rem; } }
        .stat-label { font-size: 0.6rem; color: #A5A5C0; margin-top: 4px; text-transform: uppercase; }
        .stat-sub { font-size: 0.55rem; color: #7A7A9A; margin-top: 4px; }

        /* РАСПИСАНИЕ */
        .schedule-wrapper {
            max-height: 400px;
            overflow-y: auto;
            overflow-x: auto;
            border-radius: 16px;
        }
        @media (min-width: 768px) { .schedule-wrapper { max-height: 480px; border-radius: 20px; } }
        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.7rem;
            min-width: 600px;
        }
        @media (min-width: 768px) { .schedule-table { font-size: 0.8rem; min-width: 700px; } }
        .schedule-table th, .schedule-table td {
            border-bottom: 1px solid #3D3D5C;
            padding: 10px 8px;
            text-align: left;
        }
        @media (min-width: 768px) { .schedule-table th, .schedule-table td { padding: 12px 10px; } }
        .schedule-table th {
            background: #2D2D44;
            font-weight: 600;
            color: #C0C0E0;
            position: sticky;
            top: 0;
            border-bottom: 2px solid #6C5CE7;
        }
        .homework-cell {
            cursor: pointer;
            color: #A5A5C0;
            text-decoration: underline dotted;
            word-break: break-word;
        }
        .duration-badge {
            background: #3D3D5C;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
            display: inline-block;
        }
        @media (min-width: 768px) { .duration-badge { padding: 4px 10px; font-size: 0.65rem; } }

        /* МОДУЛИ */
        .modules-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
        @media (min-width: 768px) { .modules-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; } }
        .module-card {
            background: #2D2D44;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #3D3D5C;
        }
        .module-header {
            background: #3D3D5C;
            padding: 12px 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        @media (min-width: 768px) { .module-header { padding: 14px 18px; } }
        .module-title { font-weight: 600; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
        @media (min-width: 768px) { .module-title { font-size: 0.95rem; } }
        .module-percent {
            background: #2D2D44;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
            color: #6C5CE7;
        }
        .module-expand-icon { transition: transform 0.25s; font-size: 0.7rem; }
        .module-card.open .module-expand-icon { transform: rotate(180deg); }
        .module-content { display: none; padding: 12px; }
        @media (min-width: 768px) { .module-content { padding: 16px; } }
        .topic-item { margin-bottom: 12px; border-bottom: 1px solid #3D3D5C; padding-bottom: 8px; }
        .topic-header {
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            padding: 4px 0;
        }
        .subtopics { display: none; padding-left: 16px; margin-top: 6px; }
        .topic-item.open .subtopics { display: block; }
        .subtopic {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 0.7rem;
            flex-wrap: wrap;
            gap: 6px;
        }
        .subtopic-name { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .progress-bar { width: 70px; height: 4px; background: #3D3D5C; border-radius: 2px; overflow: hidden; }
        @media (min-width: 768px) { .progress-bar { width: 90px; } }
        .progress-fill { height: 100%; background: #6C5CE7; }
        .subtopic-percent { font-weight: 600; font-size: 0.65rem; color: #6C5CE7; }

        /* КНОПКА РЕДАКТИРОВАНИЯ */
        .edit-button {
            position: fixed;
            bottom: 16px;
            right: 16px;
            background: #6C5CE7;
            color: #F4F4F9;
            border: none;
            border-radius: 50px;
            padding: 10px 18px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
        }
        @media (min-width: 768px) { .edit-button { bottom: 24px; right: 24px; padding: 12px 24px; font-size: 0.9rem; } }

        /* МОДАЛЬНОЕ ОКНО */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1E1E2F;
            border-radius: 24px;
            width: 95%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 20px;
            border: 1px solid #6C5CE7;
        }
        @media (min-width: 768px) { .modal-content { max-width: 600px; padding: 24px; border-radius: 28px; } }
        .modal-content h3 { color: #F4F4F9; margin-bottom: 16px; font-size: 1.2rem; }

        /* Табы редактора */
        .editor-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .editor-tab {
            background: #2D2D44;
            border: none;
            padding: 8px 14px;
            border-radius: 30px;
            color: #A5A5C0;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            flex: 1;
            text-align: center;
            min-width: 80px;
        }
        @media (min-width: 768px) { .editor-tab { padding: 10px 18px; font-size: 0.85rem; } }
        .editor-tab.active { background: #6C5CE7; color: #F4F4F9; }
        .editor-panel { display: none; }
        .editor-panel.active { display: block; }
        
        .editor-section {
            background: #2D2D44;
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 16px;
        }
        .editor-section label { color: #F4F4F9; font-size: 0.7rem; margin-bottom: 4px; display: block; }
        .editor-section input, .editor-section textarea, .editor-section select {
            width: 100%;
            padding: 8px 10px;
            margin-bottom: 10px;
            background: #1E1E2F;
            border: 1px solid #3D3D5C;
            border-radius: 10px;
            color: #F4F4F9;
            font-size: 0.8rem;
        }
        
        /* Компактный редактор расписания */
        .schedule-editor-item {
            background: #1E1E2F;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 10px;
        }
        .schedule-editor-header {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            font-size: 0.6rem;
            color: #6C5CE7;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .schedule-editor-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }
        .schedule-editor-row input, .schedule-editor-row textarea {
            margin-bottom: 0;
            font-size: 0.75rem;
            padding: 6px 8px;
        }
        .schedule-editor-row .full-width {
            grid-column: span 2;
        }
        
        /* Компактный редактор модулей */
        .module-select {
            margin-bottom: 12px;
        }
        .module-select select {
            font-weight: 600;
            background: #3D3D5C;
            cursor: pointer;
        }
        .current-module-editor {
            background: #1E1E2F;
            border-radius: 12px;
            padding: 12px;
        }
        .topic-editor-item {
            background: #2D2D44;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
        }
        .topic-header-editor {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .topic-header-editor input { flex: 2; margin-bottom: 0; }
        .subtopic-editor {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }
        .subtopic-editor input:first-child { flex: 3; margin-bottom: 0; }
        .subtopic-editor input:last-child { width: 65px; margin-bottom: 0; }
        
        .remove-btn {
            background: #4A3B9A;
            color: #F4F4F9;
            border: none;
            border-radius: 20px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 0.65rem;
        }
        .add-btn {
            background: #6C5CE7;
            color: #F4F4F9;
            border: none;
            border-radius: 30px;
            padding: 6px 12px;
            margin-top: 8px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 500;
            width: 100%;
        }
        .small-add-btn {
            background: #6C5CE7;
            color: #F4F4F9;
            border: none;
            border-radius: 20px;
            padding: 4px 10px;
            margin-top: 6px;
            cursor: pointer;
            font-size: 0.65rem;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-save { background: #6C5CE7; color: #F4F4F9; border: none; }
        .btn-cancel { background: #2D2D44; color: #F4F4F9; border: 1px solid #3D3D5C; }
        .error-message { color: #FF6B6B; font-size: 0.7rem; margin-top: 8px; text-align: center; }
        .info-note {
            background: #2D2D44;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.65rem;
            color: #A5A5C0;
            border-left: 3px solid #6C5CE7;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🐍 Python-разработчик</h1>
        <div class="student-name" id="studentName">👨‍🎓 Загрузка...</div>
    </div>

    <div id="nextLessonContainer"></div>

    <div class="card">
        <h2>📅 Расписание занятий</h2>
        <div class="schedule-wrapper"><div id="scheduleContainer">Загрузка...</div></div>
    </div>

    <div class="stats" id="statsContainer"></div>

    <div class="card">
        <h2>📚 Модули курса</h2>
        <div class="modules-grid" id="modulesContainer">Загрузка...</div>
    </div>
</div>

<button class="edit-button" id="editButton">✏️ Редактировать</button>

<div class="modal" id="editModal">
    <div class="modal-content">
        <h3 id="modalTitle">Введите пароль</h3>
        <div id="passwordSection">
            <input type="password" id="passwordInput" placeholder="Пароль">
            <div class="modal-buttons">
                <button class="btn-save" id="submitPassword">Войти</button>
                <button class="btn-cancel" id="closeModal">Отмена</button>
            </div>
            <div id="passwordError" class="error-message"></div>
        </div>
        <div id="editorSection" style="display: none;">
            <div class="info-note">⚡ Выберите раздел для редактирования</div>
            
            <div class="editor-tabs" id="editorTabs">
                <button class="editor-tab active" data-panel="basic">⚙️ Основное</button>
                <button class="editor-tab" data-panel="schedule">📅 Расписание</button>
                <button class="editor-tab" data-panel="modules">📚 Модули</button>
                <button class="editor-tab" data-panel="next">⭐ След. занятие</button>
            </div>
            
            <div id="panel-basic" class="editor-panel active">
                <div class="editor-section">
                    <label>👤 Имя ученика</label>
                    <input type="text" id="editStudentName">
                    <label>📊 Всего занятий в курсе</label>
                    <input type="number" id="editTotalLessons">
                </div>
            </div>
            
            <div id="panel-schedule" class="editor-panel">
                <div class="editor-section">
                    <div id="scheduleEditorList"></div>
                    <button class="add-btn" onclick="addScheduleItem()">+ Добавить занятие</button>
                </div>
            </div>
            
            <div id="panel-modules" class="editor-panel">
                <div class="editor-section">
                    <div class="module-select">
                        <label>📦 Выберите модуль для редактирования</label>
                        <select id="moduleSelect" onchange="loadSelectedModule()"></select>
                    </div>
                    <div id="currentModuleEditor"></div>
                    <button class="add-btn" onclick="addNewModule()">+ Добавить новый модуль</button>
                </div>
            </div>
            
            <div id="panel-next" class="editor-panel">
                <div class="editor-section">
                    <label>📌 Тема следующего занятия</label>
                    <input type="text" id="editNextLessonTopic" placeholder="Например: Моделирование квадрокоптера">
                    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                        <div style="flex:1"><label>Дата</label><input type="date" id="editNextLessonDate"></div>
                        <div style="flex:1"><label>Начало</label><input type="time" id="editNextLessonStart"></div>
                        <div style="flex:1"><label>Конец</label><input type="time" id="editNextLessonEnd"></div>
                    </div>
                    <div class="info-note" style="margin-top: 12px;">💡 Если оставить тему пустой — блок не будет отображаться</div>
                </div>
            </div>
            
            <div class="modal-buttons">
                <button class="btn-save" id="saveDataBtn">💾 Сохранить</button>
                <button class="btn-cancel" id="cancelEdit">Отмена</button>
            </div>
            <div id="saveResult" class="error-message"></div>
        </div>
    </div>
</div>

<script>
    const EDITOR_PASSWORD = "Alik69";
    let currentData = null;
    let repoUsername = "katmischenko";
    let repoName = "study";

    async function loadData() {
        try {
            const response = await fetch('data.json?v=' + Date.now());
            if (!response.ok) throw new Error('Файл data.json не найден');
            currentData = await response.json();
            if (!currentData.nextLesson) currentData.nextLesson = { topic: "", date: "", startTime: "", endTime: "" };
            
            document.getElementById('studentName').innerHTML = `👨‍🎓 Ученик: ${escapeHtml(currentData.studentName)}`;
            renderNextLesson(currentData.nextLesson);
            renderSchedule(currentData.scheduleData);
            renderStats(currentData.modulesData, currentData.scheduleData.length, currentData.totalLessons);
            renderModules(currentData.modulesData);
        } catch (error) {
            document.getElementById('scheduleContainer').innerHTML = '<p style="color: #A5A5C0; padding: 20px;">❌ Ошибка загрузки данных</p>';
        }
    }

    function renderNextLesson(nextLesson) {
        const container = document.getElementById('nextLessonContainer');
        if (!nextLesson || !nextLesson.topic || nextLesson.topic === "") {
            container.innerHTML = '';
            return;
        }
        const duration = calculateDuration(nextLesson.startTime, nextLesson.endTime);
        container.innerHTML = `
            <div class="next-lesson">
                <div class="next-lesson-label">⭐ Следующее занятие</div>
                <div class="next-lesson-content">
                    <div class="next-lesson-date">📅 ${formatDateShort(nextLesson.date)}</div>
                    <div class="next-lesson-topic">${escapeHtml(nextLesson.topic)}</div>
                    <div class="next-lesson-time">🕒 ${nextLesson.startTime || '—'}–${nextLesson.endTime || '—'} (${duration})</div>
                </div>
            </div>
        `;
    }

    function formatDateShort(dateStr) {
        try { return new Date(dateStr).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', weekday: 'short' }); }
        catch(e) { return dateStr; }
    }

    function renderSchedule(schedule) {
        if (!schedule || schedule.length === 0) { 
            document.getElementById('scheduleContainer').innerHTML = '<p style="padding: 20px; text-align: center;">📭 Нет занятий</p>'; 
            return; 
        }
        let html = '<table class="schedule-table"><thead><th>№</th><th>Дата</th><th>Тема</th><th>Время</th><th>Длит.</th><th>ДЗ</th></thead><tbody>';
        schedule.forEach((lesson, idx) => {
            const duration = calculateDuration(lesson.startTime, lesson.endTime);
            html += `<tr><td style="text-align:center;">${idx+1}</td><td>${formatDateShort(lesson.date)}</td><td><strong>${escapeHtml(lesson.topic)}</strong></td><td>${lesson.startTime}–${lesson.endTime}</td><td><span class="duration-badge">${duration}</span></td><td class="homework-cell" onclick="alert('📖 ${escapeHtml(lesson.topic)}\n\n${escapeHtml(lesson.homework || 'ДЗ не задано')}')">${escapeHtml(lesson.homework || '—')}</td></tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('scheduleContainer').innerHTML = html;
        setTimeout(() => {
            const wrapper = document.querySelector('.schedule-wrapper');
            if (wrapper && schedule.length > 4) {
                const rows = wrapper.querySelectorAll('tbody tr');
                if (rows.length >= 4) rows[rows.length - 4]?.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }, 100);
    }

    function renderStats(modules, lessonsCount, totalLessons) {
        if (!modules || modules.length === 0) return;
        const total = modules.length;
        const avg = Math.round(modules.reduce((a, b) => a + (b.percent || 0), 0) / total);
        const maxModule = modules.reduce((max, m) => (m.percent || 0) > (max.percent || 0) ? m : max, modules[0]);
        const weakModule = modules.reduce((min, m) => (m.percent || 0) < (min.percent || 0) ? m : min, modules[0]);
        const highModules = modules.filter(m => (m.percent || 0) >= 70).length;
        document.getElementById('statsContainer').innerHTML = `
            <div class="stat-card"><div class="stat-value">${lessonsCount}/${totalLessons}</div><div class="stat-label">Пройдено</div></div>
            <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Модулей</div></div>
            <div class="stat-card"><div class="stat-value">${maxModule.percent||0}%</div><div class="stat-label">🏆 Сильный</div><div class="stat-sub">${escapeHtml(maxModule.name.substring(0,20))}</div></div>
            <div class="stat-card"><div class="stat-value">${avg}%</div><div class="stat-label">📈 Средний</div></div>
            <div class="stat-card"><div class="stat-value">${Math.round((highModules/total)*100)}%</div><div class="stat-label">🎯 >70%</div><div class="stat-sub">${highModules} из ${total}</div></div>
            <div class="stat-card"><div class="stat-value">${weakModule.percent||0}%</div><div class="stat-label">⚠️ Повторить</div><div class="stat-sub">${escapeHtml(weakModule.name.substring(0,20))}</div></div>
        `;
    }

    function renderModules(modules) {
        let html = '';
        modules.forEach(module => {
            html += `<div class="module-card" onclick="toggleModule(this)"><div class="module-header"><div class="module-title"><span>📦</span> ${escapeHtml(module.name)}</div><div><span class="module-percent">${module.percent||0}%</span><span class="module-expand-icon">▼</span></div></div><div class="module-content">${renderTopics(module.topics)}</div></div>`;
        });
        document.getElementById('modulesContainer').innerHTML = html;
    }

    function renderTopics(topics) {
        if (!topics || topics.length === 0) return '<p style="color: #A5A5C0;">Нет тем</p>';
        let html = '';
        topics.forEach(topic => {
            html += `<div class="topic-item" onclick="event.stopPropagation(); toggleTopic(this)"><div class="topic-header"><span>📘 ${escapeHtml(topic.name)}</span><span>${topic.percent||0}% <span class="topic-expand-icon">▼</span></span></div><div class="subtopics">${renderSubtopics(topic.subtopics)}</div></div>`;
        });
        return html;
    }

    function renderSubtopics(subtopics) {
        if (!subtopics || subtopics.length === 0) return '<p style="color: #A5A5C0;">Нет подтем</p>';
        let html = '';
        subtopics.forEach(sub => {
            html += `<div class="subtopic"><div class="subtopic-name"><span>📌</span> ${escapeHtml(sub.name)}<div class="progress-bar"><div class="progress-fill" style="width: ${sub.percent}%;"></div></div></div><span class="subtopic-percent">${sub.percent}%</span></div>`;
        });
        return html;
    }

    function calculateDuration(start, end) {
        if (!start || !end) return "—";
        const s = start.split(':'), e = end.split(':');
        const min = (parseInt(e[0])*60 + parseInt(e[1])) - (parseInt(s[0])*60 + parseInt(s[1]));
        if (min <= 0) return "—";
        const h = Math.floor(min/60), m = min % 60;
        return h > 0 ? `${h}ч ${m}мин` : `${m}мин`;
    }

    function toggleModule(el) { el.classList.toggle('open'); }
    function toggleTopic(el) { el.classList.toggle('open'); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    // ========== РЕДАКТОР ==========
    function showEditor() {
        document.getElementById('modalTitle').innerText = 'Редактор';
        document.getElementById('passwordSection').style.display = 'none';
        document.getElementById('editorSection').style.display = 'block';
        
        document.getElementById('editStudentName').value = currentData.studentName;
        document.getElementById('editTotalLessons').value = currentData.totalLessons;
        document.getElementById('editNextLessonTopic').value = currentData.nextLesson?.topic || '';
        document.getElementById('editNextLessonDate').value = currentData.nextLesson?.date || '';
        document.getElementById('editNextLessonStart').value = currentData.nextLesson?.startTime || '';
        document.getElementById('editNextLessonEnd').value = currentData.nextLesson?.endTime || '';
        
        renderScheduleEditor();
        renderModuleSelect();
        loadSelectedModule();
        initTabs();
    }
    
    function initTabs() {
        const tabs = document.querySelectorAll('.editor-tab');
        tabs.forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.editor-panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`panel-${tab.dataset.panel}`).classList.add('active');
            };
        });
    }
    
    function renderScheduleEditor() {
        let html = '';
        currentData.scheduleData.forEach((item, idx) => {
            html += `
                <div class="schedule-editor-item">
                    <div class="schedule-editor-header">
                        <span>📅 Дата</span><span>📖 Тема</span>
                    </div>
                    <div class="schedule-editor-row">
                        <input type="date" value="${item.date}" id="schedule_date_${idx}">
                        <input type="text" value="${escapeHtml(item.topic)}" id="schedule_topic_${idx}" placeholder="Тема">
                    </div>
                    <div class="schedule-editor-header">
                        <span>⏰ Время</span><span>📝 ДЗ</span>
                    </div>
                    <div class="schedule-editor-row">
                        <div style="display:flex; gap:4px;"><input type="time" value="${item.startTime}" id="schedule_start_${idx}" style="width:50%;"><input type="time" value="${item.endTime}" id="schedule_end_${idx}" style="width:50%;"></div>
                        <textarea id="schedule_hw_${idx}" rows="2" placeholder="Домашнее задание">${escapeHtml(item.homework)}</textarea>
                    </div>
                    <button class="remove-btn" style="margin-top:6px;" onclick="removeScheduleItem(${idx})">🗑 Удалить занятие</button>
                </div>
            `;
        });
        document.getElementById('scheduleEditorList').innerHTML = html;
    }
    
    function renderModuleSelect() {
        const select = document.getElementById('moduleSelect');
        let options = '';
        currentData.modulesData.forEach((module, idx) => {
            options += `<option value="${idx}">${idx+1}. ${escapeHtml(module.name)}</option>`;
        });
        select.innerHTML = options;
    }
    
    function loadSelectedModule() {
        const mIdx = parseInt(document.getElementById('moduleSelect').value);
        if (isNaN(mIdx)) return;
        const module = currentData.modulesData[mIdx];
        let html = `<div class="current-module-editor">
            <label>📦 Название модуля</label>
            <input type="text" id="editModuleName" value="${escapeHtml(module.name)}" style="margin-bottom:12px;">
            <div id="moduleTopicsEditor"></div>
            <button class="small-add-btn" onclick="addTopicToCurrentModule()">+ Добавить тему</button>
            <button class="remove-btn" style="margin-top:8px;" onclick="deleteCurrentModule()">🗑 Удалить модуль</button>
        </div>`;
        document.getElementById('currentModuleEditor').innerHTML = html;
        renderTopicsEditor(mIdx);
    }
    
    function renderTopicsEditor(mIdx) {
        const module = currentData.modulesData[mIdx];
        let html = '';
        module.topics.forEach((topic, tIdx) => {
            html += `<div class="topic-editor-item">
                <div class="topic-header-editor">
                    <input type="text" value="${escapeHtml(topic.name)}" id="topic_name_${mIdx}_${tIdx}" placeholder="Название темы">
                    <button class="remove-btn" onclick="removeTopicFromCurrent(${tIdx})">✖</button>
                </div>
                <div id="subtopics_${mIdx}_${tIdx}">`;
            topic.subtopics.forEach((sub, sIdx) => {
                html += `<div class="subtopic-editor">
                    <input type="text" value="${escapeHtml(sub.name)}" id="sub_name_${mIdx}_${tIdx}_${sIdx}" placeholder="Подтема">
                    <input type="number" value="${sub.percent}" id="sub_percent_${mIdx}_${tIdx}_${sIdx}" placeholder="%" min="0" max="100">
                    <button class="remove-btn" onclick="removeSubtopicFromCurrent(${tIdx}, ${sIdx})">✖</button>
                </div>`;
            });
            html += `<button class="small-add-btn" onclick="addSubtopicToCurrent(${tIdx})">+ Добавить подтему</button>
                </div>
            </div>`;
        });
        document.getElementById('moduleTopicsEditor').innerHTML = html;
    }
    
    function addScheduleItem() {
        currentData.scheduleData.push({
            id: currentData.scheduleData.length + 1,
            date: new Date().toISOString().split('T')[0],
            topic: "Новое занятие",
            startTime: "17:00",
            endTime: "19:00",
            homework: ""
        });
        renderScheduleEditor();
    }
    
    function removeScheduleItem(idx) {
        currentData.scheduleData.splice(idx, 1);
        currentData.scheduleData.forEach((item, i) => { item.id = i + 1; });
        renderScheduleEditor();
    }
    
    function addNewModule() {
        currentData.modulesData.push({
            name: "Новый модуль",
            percent: 0,
            topics: [{ name: "Новая тема", percent: 0, subtopics: [{ name: "Новая подтема", percent: 0 }] }]
        });
        renderModuleSelect();
        document.getElementById('moduleSelect').value = currentData.modulesData.length - 1;
        loadSelectedModule();
    }
    
    function deleteCurrentModule() {
        const mIdx = parseInt(document.getElementById('moduleSelect').value);
        if (currentData.modulesData.length > 1) {
            currentData.modulesData.splice(mIdx, 1);
            renderModuleSelect();
            document.getElementById('moduleSelect').value = 0;
            loadSelectedModule();
        } else {
            alert("Нельзя удалить последний модуль");
        }
    }
    
    function addTopicToCurrentModule() {
        const mIdx = parseInt(document.getElementById('moduleSelect').value);
        currentData.modulesData[mIdx].topics.push({
            name: "Новая тема",
            percent: 0,
            subtopics: [{ name: "Новая подтема", percent: 0 }]
        });
        loadSelectedModule();
    }
    
    function removeTopicFromCurrent(tIdx) {
        const mIdx = parseInt(document.getElementById('moduleSelect').value);
        if (currentData.modulesData[mIdx].topics.length > 1) {
            currentData.modulesData[mIdx].topics.splice(tIdx, 1);
            loadSelectedModule();
        } else {
            alert("В модуле должна быть хотя бы одна тема");
        }
    }
    
    function addSubtopicToCurrent(tIdx) {
        const mIdx = parseInt(document.getElementById('moduleSelect').value);
        currentData.modulesData[mIdx].topics[tIdx].subtopics.push({ name: "Новая подтема", percent: 0 });
        loadSelectedModule();
    }
    
    function removeSubtopicFromCurrent(tIdx, sIdx) {
        const mIdx = parseInt(document.getElementById('moduleSelect').value);
        if (currentData.modulesData[mIdx].topics[tIdx].subtopics.length > 1) {
            currentData.modulesData[mIdx].topics[tIdx].subtopics.splice(sIdx, 1);
            loadSelectedModule();
        } else {
            alert("В теме должна быть хотя бы одна подтема");
        }
    }
    
    function collectDataFromEditor() {
        currentData.studentName = document.getElementById('editStudentName').value;
        currentData.totalLessons = parseInt(document.getElementById('editTotalLessons').value);
        
        currentData.nextLesson = {
            topic: document.getElementById('editNextLessonTopic').value,
            date: document.getElementById('editNextLessonDate').value,
            startTime: document.getElementById('editNextLessonStart').value,
            endTime: document.getElementById('editNextLessonEnd').value
        };
        
        for (let i = 0; i < currentData.scheduleData.length; i++) {
            currentData.scheduleData[i].date = document.getElementById(`schedule_date_${i}`).value;
            currentData.scheduleData[i].topic = document.getElementById(`schedule_topic_${i}`).value;
            currentData.scheduleData[i].startTime = document.getElementById(`schedule_start_${i}`).value;
            currentData.scheduleData[i].endTime = document.getElementById(`schedule_end_${i}`).value;
            currentData.scheduleData[i].homework = document.getElementById(`schedule_hw_${i}`).value;
        }
        
        const mIdx = parseInt(document.getElementById('moduleSelect').value);
        if (!isNaN(mIdx)) {
            currentData.modulesData[mIdx].name = document.getElementById('editModuleName').value;
            for (let tIdx = 0; tIdx < currentData.modulesData[mIdx].topics.length; tIdx++) {
                const topicName = document.getElementById(`topic_name_${mIdx}_${tIdx}`);
                if (topicName) currentData.modulesData[mIdx].topics[tIdx].name = topicName.value;
                let totalSubPercent = 0;
                for (let sIdx = 0; sIdx < currentData.modulesData[mIdx].topics[tIdx].subtopics.length; sIdx++) {
                    const subName = document.getElementById(`sub_name_${mIdx}_${tIdx}_${sIdx}`);
                    const subPercent = document.getElementById(`sub_percent_${mIdx}_${tIdx}_${sIdx}`);
                    if (subName) currentData.modulesData[mIdx].topics[tIdx].subtopics[sIdx].name = subName.value;
                    if (subPercent) {
                        const val = parseInt(subPercent.value) || 0;
                        currentData.modulesData[mIdx].topics[tIdx].subtopics[sIdx].percent = val;
                        totalSubPercent += val;
                    }
                }
                const newTopicPercent = Math.round(totalSubPercent / currentData.modulesData[mIdx].topics[tIdx].subtopics.length);
                currentData.modulesData[mIdx].topics[tIdx].percent = newTopicPercent;
            }
            let totalTopicPercent = 0;
            for (let tIdx = 0; tIdx < currentData.modulesData[mIdx].topics.length; tIdx++) {
                totalTopicPercent += currentData.modulesData[mIdx].topics[tIdx].percent;
            }
            currentData.modulesData[mIdx].percent = Math.round(totalTopicPercent / currentData.modulesData[mIdx].topics.length);
        }
    }
    
    async function saveDataToGitHub() {
        collectDataFromEditor();
        document.getElementById('saveResult').innerHTML = '⏳ Сохранение...';
        try {
            const getResponse = await fetch(`https://api.github.com/repos/${repoUsername}/${repoName}/contents/data.json`);
            if (!getResponse.ok) throw new Error('Не удалось получить файл');
            const fileInfo = await getResponse.json();
            const updateResponse = await fetch(`https://api.github.com/repos/${repoUsername}/${repoName}/contents/data.json`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: 'Обновление данных',
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2)))),
                    sha: fileInfo.sha,
                    branch: 'main'
                })
            });
            if (updateResponse.ok) {
                document.getElementById('saveResult').innerHTML = '✅ Сохранено! Страница обновится...';
                setTimeout(() => location.reload(), 2500);
            } else {
                const errorData = await updateResponse.json();
                document.getElementById('saveResult').innerHTML = '❌ Ошибка: ' + (errorData.message || 'Неизвестная ошибка');
            }
        } catch(e) {
            document.getElementById('saveResult').innerHTML = '❌ Ошибка: ' + e.message;
        }
    }
    
    // Инициализация
    document.getElementById('editButton').onclick = () => {
        document.getElementById('editModal').classList.add('active');
        document.getElementById('passwordSection').style.display = 'block';
        document.getElementById('editorSection').style.display = 'none';
        document.getElementById('passwordInput').value = '';
    };
    document.getElementById('submitPassword').onclick = () => {
        if (document.getElementById('passwordInput').value === EDITOR_PASSWORD) showEditor();
        else document.getElementById('passwordError').innerHTML = '❌ Неверный пароль';
    };
    document.getElementById('closeModal').onclick = () => document.getElementById('editModal').classList.remove('active');
    document.getElementById('cancelEdit').onclick = () => document.getElementById('editModal').classList.remove('active');
    document.getElementById('saveDataBtn').onclick = saveDataToGitHub;
    
    window.addScheduleItem = addScheduleItem;
    window.removeScheduleItem = removeScheduleItem;
    window.addNewModule = addNewModule;
    window.addTopicToCurrentModule = addTopicToCurrentModule;
    window.removeTopicFromCurrent = removeTopicFromCurrent;
    window.addSubtopicToCurrent = addSubtopicToCurrent;
    window.removeSubtopicFromCurrent = removeSubtopicFromCurrent;
    window.deleteCurrentModule = deleteCurrentModule;
    window.loadSelectedModule = loadSelectedModule;
    
    loadData();
</script>
