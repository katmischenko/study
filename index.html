<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Учебный трекер Python</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f8fafc 0%, #eef2f8 100%);
            min-height: 100vh;
            padding: 20px;
        }

        @media (min-width: 768px) {
            body {
                padding: 32px;
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ========== ШАПКА ========== */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 32px 36px;
            border-radius: 32px;
            margin-bottom: 32px;
            box-shadow: 0 20px 35px -12px rgba(102, 126, 234, 0.35);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '🐍';
            position: absolute;
            right: 20px;
            bottom: 10px;
            font-size: 100px;
            opacity: 0.1;
            pointer-events: none;
        }

        @media (max-width: 640px) {
            .header {
                padding: 24px 24px;
                border-radius: 24px;
                margin-bottom: 24px;
            }
            .header::before {
                font-size: 70px;
                right: 10px;
                bottom: 5px;
            }
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.02em;
        }

        @media (max-width: 640px) {
            .header h1 {
                font-size: 1.4rem;
            }
        }

        .student-name {
            font-size: 1rem;
            margin-top: 12px;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            background: rgba(255,255,255,0.15);
            display: inline-flex;
            padding: 6px 16px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        @media (max-width: 640px) {
            .student-name {
                font-size: 0.85rem;
                margin-top: 10px;
            }
        }

        /* ========== КАРТОЧКИ ========== */
        .card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 28px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.03);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(102, 126, 234, 0.08);
        }

        .card:hover {
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 640px) {
            .card {
                padding: 18px;
                border-radius: 24px;
                margin-bottom: 20px;
            }
        }

        .card h2 {
            color: #1e293b;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #eef2ff;
            font-size: 1.35rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @media (max-width: 640px) {
            .card h2 {
                font-size: 1.2rem;
                margin-bottom: 16px;
            }
        }

        /* ========== СТАТИСТИКА (ЭЛЕГАНТНЫЕ КАРТОЧКИ) ========== */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 28px;
        }

        @media (max-width: 900px) {
            .stats {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
        }

        @media (max-width: 550px) {
            .stats {
                grid-template-columns: 1fr;
                gap: 14px;
            }
        }

        .stat-card {
            background: white;
            padding: 22px 18px;
            border-radius: 24px;
            text-align: center;
            transition: all 0.25s ease;
            border: 1px solid rgba(102, 126, 234, 0.12);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -12px rgba(102, 126, 234, 0.2);
            border-color: rgba(102, 126, 234, 0.25);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-value {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        @media (max-width: 640px) {
            .stat-value {
                font-size: 2rem;
            }
        }

        .stat-label {
            color: #475569;
            font-size: 0.75rem;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            font-weight: 600;
        }

        .stat-sub {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 6px;
            font-weight: 500;
        }

        /* ========== РАСПИСАНИЕ ========== */
        .schedule-wrapper {
            max-height: 480px;
            overflow-y: auto;
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #eef2ff;
            background: #ffffff;
        }

        @media (max-width: 640px) {
            .schedule-wrapper {
                max-height: 400px;
            }
        }

        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 620px;
        }

        @media (max-width: 640px) {
            .schedule-table {
                font-size: 0.75rem;
                min-width: 540px;
            }
        }

        .schedule-table th,
        .schedule-table td {
            border-bottom: 1px solid #f1f5f9;
            padding: 14px 12px;
            text-align: left;
            vertical-align: top;
        }

        .schedule-table th {
            background: #fafcff;
            font-weight: 600;
            color: #1e293b;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 2px solid #e2e8f0;
        }

        .schedule-table tr:hover td {
            background: #fafcff;
        }

        .homework-cell {
            cursor: pointer;
            color: #4f46e5;
            transition: color 0.2s;
            font-weight: 500;
        }

        .homework-cell:hover {
            color: #7c3aed;
            text-decoration: underline;
        }

        .duration-badge {
            background: #eef2ff;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            display: inline-block;
            font-weight: 500;
            color: #4f46e5;
            white-space: nowrap;
        }

        /* ========== МОДУЛИ ========== */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        @media (max-width: 900px) {
            .modules-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        .module-card {
            background: white;
            border-radius: 24px;
            border: 1px solid #eef2ff;
            overflow: hidden;
            transition: all 0.25s ease;
        }

        .module-card:hover {
            border-color: #cbd5e1;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        }

        .module-header {
            background: #fafcff;
            padding: 18px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
            border-bottom: 1px solid #eef2ff;
        }

        .module-header:hover {
            background: #f5f3ff;
        }

        .module-title {
            font-weight: 700;
            font-size: 1rem;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @media (max-width: 640px) {
            .module-title {
                font-size: 0.9rem;
            }
        }

        .module-percent {
            background: #eef2ff;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .module-expand-icon {
            font-size: 0.85rem;
            color: #94a3b8;
            transition: transform 0.25s;
        }

        .module-card.open .module-expand-icon {
            transform: rotate(180deg);
        }

        .module-content {
            display: none;
            padding: 20px;
            background: #ffffff;
        }

        .module-card.open .module-content {
            display: block;
        }

        /* ========== ТЕМЫ ========== */
        .topic-item {
            margin-bottom: 18px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 14px;
        }

        .topic-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .topic-header {
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-weight: 500;
            color: #334155;
        }

        .topic-percent {
            font-size: 0.75rem;
            font-weight: 600;
        }

        .topic-expand-icon {
            font-size: 0.7rem;
            color: #94a3b8;
            transition: transform 0.2s;
            margin-left: 8px;
        }

        .topic-item.open .topic-expand-icon {
            transform: rotate(180deg);
        }

        .subtopics {
            display: none;
            padding-left: 24px;
            margin-top: 12px;
        }

        .topic-item.open .subtopics {
            display: block;
        }

        .subtopic {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f8fafc;
            font-size: 0.8rem;
            flex-wrap: wrap;
            gap: 10px;
        }

        .subtopic:last-child {
            border-bottom: none;
        }

        .subtopic-name {
            flex: 2;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .progress-bar {
            width: 110px;
            height: 6px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
        }

        @media (max-width: 640px) {
            .progress-bar {
                width: 80px;
            }
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }

        .subtopic-percent {
            font-weight: 600;
            min-width: 48px;
            text-align: right;
            font-size: 0.75rem;
        }

        /* ========== СКРОЛЛБАР ========== */
        .schedule-wrapper::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .schedule-wrapper::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }

        .schedule-wrapper::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .schedule-wrapper::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🐍 Python-разработчик</h1>
        <div class="student-name" id="studentName">👨‍🎓 Загрузка...</div>
    </div>

    <!-- РАСПИСАНИЕ -->
    <div class="card">
        <h2>📅 Расписание занятий</h2>
        <div class="schedule-wrapper">
            <div id="scheduleContainer">Загрузка...</div>
        </div>
    </div>

    <!-- СТАТИСТИКА -->
    <div class="stats" id="statsContainer"></div>

    <!-- МОДУЛИ -->
    <div class="card">
        <h2>📚 Модули курса</h2>
        <div class="modules-grid" id="modulesContainer">Загрузка...</div>
    </div>
</div>

<script>
    async function loadData() {
        try {
            const response = await fetch('data.json?v=' + Date.now());
            if (!response.ok) {
                throw new Error('Файл data.json не найден');
            }
            const data = await response.json();
            
            document.getElementById('studentName').innerHTML = `👨‍🎓 Ученик: ${escapeHtml(data.studentName)}`;
            renderSchedule(data.scheduleData);
            renderStats(data.modulesData, data.scheduleData.length, data.totalLessons);
            renderModules(data.modulesData);
            
        } catch (error) {
            console.error('Ошибка загрузки данных:', error);
            document.getElementById('scheduleContainer').innerHTML = '<p style="color: #e74c3c; padding: 20px;">❌ Не удалось загрузить данные. Проверьте, что файл <code>data.json</code> существует.</p>';
            document.getElementById('modulesContainer').innerHTML = '<p style="color: #e74c3c;">❌ Ошибка загрузки данных</p>';
            document.getElementById('statsContainer').innerHTML = '<div class="stat-card"><div class="stat-value">0</div><div class="stat-label">Ошибка</div></div>';
        }
    }
    
    function renderSchedule(schedule) {
        if (!schedule || schedule.length === 0) {
            document.getElementById('scheduleContainer').innerHTML = '<p style="padding: 20px; text-align: center;">📭 Нет занятий</p>';
            return;
        }
        
        let html = '<table class="schedule-table"><thead> <th>№</th><th>Дата</th><th>Тема</th><th>Время</th><th>Длит.</th><th>ДЗ</th></thead><tbody>';
        
        schedule.forEach((lesson, idx) => {
            const duration = calculateDuration(lesson.startTime, lesson.endTime);
            const homeworkText = lesson.homework ? (lesson.homework.length > 65 ? lesson.homework.substring(0, 65) + '…' : lesson.homework) : '—';
            
            html += `
                <tr>
                    <td style="text-align:center; font-weight:600;">${idx + 1}</td>
                    <td style="white-space:nowrap;">${formatDate(lesson.date)}</td>
                    <td><strong>${escapeHtml(lesson.topic)}</strong></td>
                    <td style="white-space:nowrap;">${lesson.startTime}–${lesson.endTime}</td>
                    <td style="white-space:nowrap;"><span class="duration-badge">${duration}</span></td>
                    <td class="homework-cell" onclick="alert('📖 ${escapeHtml(lesson.topic)}\n\n${escapeHtml(lesson.homework || 'Домашнее задание не задано')}')">${homeworkText} ${lesson.homework ? '📄' : ''}</td>
                </tr>
            `;
        });
        
        html += '</tbody></table>';
        document.getElementById('scheduleContainer').innerHTML = html;
    }
    
    function renderStats(modules, lessonsCount, totalLessons) {
        if (!modules || modules.length === 0) return;
        
        const total = modules.length;
        const avg = Math.round(modules.reduce((a, b) => a + (b.percent || 0), 0) / total);
        
        const maxModule = modules.reduce((max, m) => (m.percent || 0) > (max.percent || 0) ? m : max, modules[0]);
        const weakModule = modules.reduce((min, m) => (m.percent || 0) < (min.percent || 0) ? m : min, modules[0]);
        const highModules = modules.filter(m => (m.percent || 0) >= 70).length;
        
        const statsHTML = `
            <div class="stat-card">
                <div class="stat-value">${lessonsCount}<span style="font-size:1.2rem;">/${totalLessons}</span></div>
                <div class="stat-label">Пройдено занятий</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">${total}</div>
                <div class="stat-label">Всего модулей</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">${maxModule.percent || 0}%</div>
                <div class="stat-label">🏆 Сильный модуль</div>
                <div class="stat-sub">${escapeHtml(maxModule.name.substring(0, 28))}</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">${avg}%</div>
                <div class="stat-label">📈 Средний прогресс</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">${Math.round((highModules / total) * 100)}%</div>
                <div class="stat-label">🎯 Модули >70%</div>
                <div class="stat-sub">${highModules} из ${total}</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">${weakModule.percent || 0}%</div>
                <div class="stat-label">⚠️ Нужно повторить</div>
                <div class="stat-sub">${escapeHtml(weakModule.name.substring(0, 28))}</div>
            </div>
        `;
        document.getElementById('statsContainer').innerHTML = statsHTML;
    }
    
    function formatDate(dateStr) {
        try {
            const d = new Date(dateStr);
            return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', weekday: 'short' });
        } catch(e) {
            return dateStr;
        }
    }
    
    function calculateDuration(start, end) {
        if (!start || !end) return "—";
        const s = start.split(':'), e = end.split(':');
        const min = (parseInt(e[0])*60 + parseInt(e[1])) - (parseInt(s[0])*60 + parseInt(s[1]));
        if (min <= 0) return "—";
        const h = Math.floor(min/60), m = min % 60;
        return h > 0 ? `${h}ч ${m}мин` : `${m}мин`;
    }
    
    function renderModules(modules) {
        if (!modules || modules.length === 0) {
            document.getElementById('modulesContainer').innerHTML = '<p>Нет модулей</p>';
            return;
        }
        
        let html = '';
        modules.forEach((module) => {
            const moduleColor = module.percent >= 75 ? '#27ae60' : (module.percent >= 50 ? '#f39c12' : '#e74c3c');
            html += `
                <div class="module-card" onclick="toggleModule(this)">
                    <div class="module-header">
                        <div class="module-title">
                            <span>📦</span> ${escapeHtml(module.name)}
                        </div>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <span class="module-percent" style="background: ${moduleColor}15; color: ${moduleColor};">${module.percent || 0}%</span>
                            <span class="module-expand-icon">▼</span>
                        </div>
                    </div>
                    <div class="module-content">
                        ${renderTopics(module.topics)}
                    </div>
                </div>
            `;
        });
        document.getElementById('modulesContainer').innerHTML = html;
    }
    
    function renderTopics(topics) {
        if (!topics || topics.length === 0) return '<p style="color: #94a3b8;">Нет тем</p>';
        
        let html = '';
        topics.forEach((topic) => {
            const topicColor = topic.percent >= 75 ? '#27ae60' : (topic.percent >= 50 ? '#f39c12' : '#e74c3c');
            html += `
                <div class="topic-item" onclick="event.stopPropagation(); toggleTopic(this)">
                    <div class="topic-header">
                        <span>📘 ${escapeHtml(topic.name)}</span>
                        <span style="display: flex; align-items: center; gap: 6px;">
                            <span class="topic-percent" style="color: ${topicColor};">${topic.percent || 0}%</span>
                            <span class="topic-expand-icon">▼</span>
                        </span>
                    </div>
                    <div class="subtopics">
                        ${renderSubtopics(topic.subtopics)}
                    </div>
                </div>
            `;
        });
        return html;
    }
    
    function renderSubtopics(subtopics) {
        if (!subtopics || subtopics.length === 0) return '<p style="color: #94a3b8; font-size: 0.75rem;">Нет подтем</p>';
        
        let html = '';
        subtopics.forEach(sub => {
            const subColor = sub.percent >= 75 ? '#27ae60' : (sub.percent >= 50 ? '#f39c12' : '#e74c3c');
            html += `
                <div class="subtopic">
                    <div class="subtopic-name">
                        <span>📌</span> ${escapeHtml(sub.name)}
                        <div class="progress-bar"><div class="progress-fill" style="width: ${sub.percent}%; background: ${subColor};"></div></div>
                    </div>
                    <span class="subtopic-percent" style="color: ${subColor};">${sub.percent}%</span>
                </div>
            `;
        });
        return html;
    }
    
    function toggleModule(element) {
        element.classList.toggle('open');
    }
    
    function toggleTopic(element) {
        element.classList.toggle('open');
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }
    
    loadData();
</script>
</body>
</html>
